<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }
        body {
            background: #e6d9ef;
            color: #222;
        }
        /*Navbar*/
        nav{
            width: 100%;
            background: #7c4bb3;
            padding: 18px 70px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        nav h2 {
            color: white;
            font-size: 28px;
        }
        nav ul {
            display: flex;
            gap: 30px;
            list-style-type: none;
        }
        nav ul li a {
            text-decoration: none;
            color: white;
            font-size: 16px;
            transition: 0.3s;
        }
        nav ul li a:hover {
            color: #ddd;
        }
        /*Hero section*/
        .hero {
            background: #b993d6;
            min-height: 90vh;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 70px;
            flex-wrap: wrap;
        }
        .hero-text {
            max-width: 500px;
        }
        .hero-text p {
            color: white;
            margin-bottom: 10px;
            font-size: 20px;
        }
        .hero-text h1 {
            color: white;
            font-size: 65px;
            line-height: 1.2;
            margin-bottom: 25px;
            font-weight: bold;
        }
        .hero-img {
            width: 450px;
            max-width: 100%;
        }
    </style>
</head>
<body>
    <nav>
        <h2>Virtual</h2>
        <ul>
            <li><a href="">Home</a></li>
            <li><a href="">Blog</a></li>
            <li><a href="">About</a></li>
            <li><a href="">Services</a></li>
            <li><a href="">Reviews</a></li>
            <li><a href="">Contact</a></li>
        </ul>
    </nav>
    <section>
        <div class="hero-text">
            <p>Virtual Reality</p>
            <h1>
                BE PART <br>
                OF THE NEW <br>
                TECHNOLOGIES <br>
            </h1>
            <button>LEARN MORE</button>
        </div>
         <img src="" alt="">
    </section>
    <section class="future">
        <img src="" alt="">
        <div class="future-text">
            <p>Virtual reality technology is changing the wa we interact with the digital world. Explore immersive experiences,futuristic innovations,and modern entertainment.</p>
            <button>LEARN MORE</button>
        </div>
    </section>
</body>
</html>
