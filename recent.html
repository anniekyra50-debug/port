<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
        body {
            background: #0b0b0b;
            font-family: Arial, sans-serif;
        }
        section{
            width: 85%;
            margin: 80px auto;
        }
        section h2 {
            color: #fff;
            font-size: 32px;
            margin-bottom: 40px;
        }
        .work-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minamx (250px, 1fr));
            gap: 25px;
        }
        work-card {
            background: #161616;
            padding: 35px 25px;
            border-radius: 12px;
            text-align: center;
            transition: 3s;
            border: 1px solid #222;
        }
        .work-card:hover {
            transform:translateY(-10px);
            box-shadow: 0 0 20px rgba(255, 0, 170, .3);
        }
        .work-card i {
            font-size: 55px;
            color: #b84dff;
            margin-bottom: 20px;
        }
        .work-card h3 {
            color: #fff;
            margin-bottom: 15px;
        }
        .work-card p {
            color: #bdbdbd;
            line-height: 1.7;  
           }
    </style>
</head>
<body>
    <!--Recent works-->
    <section id="works" class="works">
        <div class="work-container">
            <div class="work-card">
                <i class="fa fa-trophy"></i>
                <h3>Awarded design</h3>
                <p>Creative UI/UX designs with modern layouts and attractuve user experiences.</p>
            </div>
            <div class="work-card">
                <i class="fa fa-paint-brush"></i>
                <h3>Design and Creative</h3>
                <p>Professional graphic designs,branding,posters,and digital content.</p>
            </div>
            <div class="work-card">
                <i class="fa fa-code"></i>
                <h3>App Development</h3>
                <p>Responsive websites and mobile applications built wiht clean code.</p>
            </div>
        </div>
    </section>
</body>
</html>
